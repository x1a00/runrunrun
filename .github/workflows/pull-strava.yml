name: Pull Strava Activities

# Pulls the newest Strava run every day at 6am Eastern (10:00 UTC).
# Only fetches activities not yet on disk — stops the moment it sees a
# known activity ID. Opens a PR for review instead of pushing to main.
#
# REQUIRED repository secrets (Settings → Secrets and variables → Actions):
#   STRAVA_CLIENT_ID       — from strava.com/settings/api
#   STRAVA_CLIENT_SECRET   — ditto
#   STRAVA_ACCESS_TOKEN    — seed token with scope=activity:read_all
#   STRAVA_REFRESH_TOKEN   — seed refresh token
#   STRAVA_ROTATE_PAT      — PAT with repo+workflow scope for token rotation

on:
  schedule:
    - cron: "0 10 * * *" # 6am Eastern (EDT = UTC-4)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Write .env.local from secrets
        run: |
          cat > .env.local <<EOF
          STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_ACCESS_TOKEN=${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_REFRESH_TOKEN=${{ secrets.STRAVA_REFRESH_TOKEN }}
          EOF

      - name: Pull Strava activities
        run: node scripts/pull-strava.mjs

      - name: Rotate Strava tokens (if PAT configured)
        if: ${{ env.HAS_PAT == 'true' }}
        env:
          HAS_PAT: ${{ secrets.STRAVA_ROTATE_PAT != '' }}
          GH_TOKEN: ${{ secrets.STRAVA_ROTATE_PAT }}
        run: |
          ACCESS=$(grep '^STRAVA_ACCESS_TOKEN=' .env.local | cut -d= -f2-)
          REFRESH=$(grep '^STRAVA_REFRESH_TOKEN=' .env.local | cut -d= -f2-)
          gh secret set STRAVA_ACCESS_TOKEN --body "$ACCESS" --repo "$GITHUB_REPOSITORY"
          gh secret set STRAVA_REFRESH_TOKEN --body "$REFRESH" --repo "$GITHUB_REPOSITORY"

      - name: Remove .env.local before committing
        run: rm -f .env.local

      - name: Open PR with new data (never pushes directly to main)
        env:
          GH_TOKEN: ${{ secrets.STRAVA_ROTATE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/gpx public/tracks public/photos public/strava-meta.json src/lib/gpx-processed.ts
          if git diff --staged --quiet; then
            echo "No new activities — nothing to PR."
            exit 0
          fi
          BRANCH="data/strava-$(date -u +%Y-%m-%d-%H%M)"
          git checkout -b "$BRANCH"
          git commit -m "data: new Strava activity ($(date -u +%Y-%m-%d))"
          git push origin "$BRANCH"
          gh pr create \
            --title "data: new run $(date -u +%Y-%m-%d)" \
            --body "New activity pulled from Strava. Merge to deploy." \
            --base master \
            --head "$BRANCH"
