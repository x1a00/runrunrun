# ─────────────────────────────────────────────────────────────────────────────
# site.yaml — all user-editable text for the site.
# Edit this file, commit + push → GitHub Actions rebuilds in ~90 seconds.
# ─────────────────────────────────────────────────────────────────────────────

# ── HEADER ────────────────────────────────────────────────────────────────────
# The large title shown at the top of the page.
header:
  name: "RUN RUN RUN"
  # Subtitle line below the title.
  # Set to "" to hide entirely.
  # Leave this key out (delete the line) to auto-show "runs logged from X to Y".
  # Example:  subtitle: "a running log"
  subtitle: ""

# ── FOREWORD ──────────────────────────────────────────────────────────────────
# Prose shown below the streak hero numbers.
# Add or remove "- ..." lines freely. Each entry becomes one paragraph.
foreword:
  - "My running log "
  - "To be hallucinated... "
  - "Fulfilled by Claude "

# ── SECTIONS ──────────────────────────────────────────────────────────────────
# Second-line subtitles shown under each section heading.
# Set any subtitle to "" to hide it.
sections:
  daily_log:
    # Shown in smaller italic text below "DAILY LOG".
    # Example: "every. single. day."
    subtitle: ""

  notable_runs:
    # Captions shown in smaller italic text below each tab button.
    # Set to "" to hide individual captions.
    captions:
      longest: "runs ranked by distance"
      personal_bests: "fastest pace per race distance"
      elevation: "most vert in a single run"

# ── FOOTER ────────────────────────────────────────────────────────────────────
# Lines shown at the bottom of the page.
# Each entry supports:
#   text:      (required) plain text — or the prefix before a link
#   url:       (optional) makes part (or all) of the line clickable
#   linkText:  (optional) the clickable/underlined portion of the line
#              If url is set but linkText is omitted, the entire text becomes the link.
#
# Examples:
#   Plain text only:
#     - text: "Made with ♥"
#
#   Whole line is a link (entire text underlined):
#     - text: "nodaysoff.run"
#       url: "https://nodaysoff.run"
#
#   Inline link — only the linkText part is underlined:
#     - text: "Replicated from "
#       linkText: "nodaysoff.run"
#       url: "https://nodaysoff.run"
footer:
  - text: "Replicated from "
    linkText: "nodaysoff.run"
    url: "https://nodaysoff.run"
